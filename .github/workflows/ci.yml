name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx ng lint

  unit-lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:ci

  build-lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:lib

  build-demo:
    needs: [build-lib]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:demo

  pack:
    needs: [build-lib]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run pack:lib
      - name: Expose lib.tgz for consumers
        run: |
          f="$(ls -1 dist-pack/*.tgz | head -1)"
          cp "$f" dist-pack/lib.tgz
      - uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: dist-pack/

  consumer-smoke:
    needs: [pack]
    runs-on: ubuntu-latest
    # Node matrix. Peer range is >=18 <22; consumer-smoke currently pins Angular 18.
    # Add per-major consumer folders when validating Angular 19–21.
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: dist-pack
      - name: Install CI tarball (no lockfile pinned to lib.tgz)
        run: |
          test -f dist-pack/lib.tgz
          cd consumer-smoke
          rm -rf node_modules
          npm install --no-audit --no-fund
      - run: cd consumer-smoke && npm run build
