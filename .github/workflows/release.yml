name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run lint
      - run: npm run test:ci
      - run: npm run build:lib
      - run: npm run pack:lib
      - run: npm run consumer:smoke
      - name: Publish to npm
        run: npm publish --access=public --provenance ./dist/ng2-smart-table
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
